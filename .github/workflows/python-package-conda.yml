name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Miniconda Python 3.10
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: '3.10'
        activate-environment: test-env
        auto-activate-base: false
    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda install pytorch==1.13.1 torchvision==0.14.1 torchaudio==0.13.1 cpuonly -c pytorch
        pip install "MKL==2024.0.0" "setuptools<80.9.0" wheel
        pip install --no-build-isolation mmcv==1.7.2
        if [ -f setup.py ]; then pip install -e .; fi
        if [ -d g2tm ]; then if [ -f g2tm/setup.py ]; then cd g2tm/ && pip install -e . && cd ../; fi; fi
    - name: Install flake8
      shell: bash -l {0}
      run: |
        conda install flake8
    - name: Lint with flake8
      shell: bash -l {0}
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test  installation
      run: |
        python -c 'import segm'
        python -c 'import g2tm'
